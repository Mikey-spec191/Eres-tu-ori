<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Título y Descripción para WhatsApp -->
    <title>Eres tú ❤️</title>
    <meta name="description" content="Una sorpresa especial para ti">
    
    <!-- Etiquetas Open Graph para la vista previa de WhatsApp -->
    <meta property="og:title" content="Eres tú ❤️">
    <meta property="og:description" content="Haz clic para ver esta sorpresa especial...">
    <meta property="og:image" content="https://cdn.pixabay.com/photo/2022/10/27/17/01/praia-sol-7551257_1280.jpg">
    <meta property="og:type" content="website">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

        :root {
            --vh: 1vh;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            width: 100vw;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #070a19;
            background-image:
                linear-gradient(rgba(7, 10, 25, 0.62), rgba(7, 10, 25, 0.62)),
                url('https://cdn.pixabay.com/photo/2022/10/27/17/01/praia-sol-7551257_1280.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: fixed; /* Evita scroll accidental en iOS */
        }

        .glow-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.18), transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(148, 163, 255, 0.2), transparent 50%);
            z-index: 0;
            transform: translateZ(0);
        }

        .main {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        #particles-layer {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        #lyrics-container {
            font-size: clamp(1.8rem, 8vw, 4.5rem);
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: 0.02em;
            min-height: 1.3em;
            color: #ffffff;
            text-shadow:
                0 0 10px rgba(255, 255, 255, 0.85),
                0 0 22px rgba(255, 255, 255, 0.75),
                0 12px 28px rgba(0, 0, 0, 0.65);
            -webkit-filter: saturate(1.06);
            filter: saturate(1.06);
            transform: translateZ(0);
        }

        .lyric-word {
            display: inline-block;
            white-space: nowrap;
            margin-right: 0.28em;
        }

        .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(18px) rotateX(-88deg);
            -webkit-filter: blur(4px);
            filter: blur(4px);
            animation: revealLetter 0.5s cubic-bezier(0.2, 0.6, 0.2, 1) forwards;
        }

        .fade-out {
            animation: fadeOutLine 0.35s ease-in forwards;
        }

        .start-modal {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(4, 7, 18, 0.95);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .start-card {
            width: 85%;
            max-width: 350px;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(150deg, rgba(26, 34, 65, 0.95), rgba(10, 14, 30, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .start-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 25px;
        }

        .start-btn {
            border: none;
            border-radius: 50px;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            color: #0e1228;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            -webkit-appearance: none;
        }

        .particle {
            position: absolute;
            width: var(--size, 6px);
            height: var(--size, 6px);
            border-radius: 50%;
            background: #fff;
            pointer-events: none;
            animation: explode var(--duration, 1s) ease-out forwards;
        }

        @keyframes revealLetter {
            to { opacity: 1; transform: translateY(0) rotateX(0); -webkit-filter: blur(0); filter: blur(0); }
        }

        @keyframes fadeOutLine {
            to { opacity: 0; transform: translateY(-18px); -webkit-filter: blur(8px); filter: blur(8px); }
        }

        @keyframes explode {
            to { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
        }
    </style>
</head>
<body>
    <!-- Audio con URL directa y atributos de compatibilidad -->
    <audio id="song" preload="auto" playsinline webkit-playsinline>
        <source src="https://github.com/Baque2005/Organizador/raw/refs/heads/master/Eres%20t%C3%BA.mp3" type="audio/mpeg">
    </audio>

    <div class="glow-bg"></div>
    <div id="particles-layer"></div>

    <div id="startModal" class="start-modal">
        <div class="start-card">
            <div class="start-title">Apreta aquí ❤️</div>
            <button id="startBtn" class="start-btn">Para ti!</button>
        </div>
    </div>

    <main class="main">
        <h1 id="lyrics-container"></h1>
    </main>

    <script>
        // Fix para altura real en móviles (ignora barras de navegación)
        const setVH = () => {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        };
        window.addEventListener('resize', setVH);
        setVH();

        const lyricsData = [
            { time: 0, text: "Eres tu," }, { time: 4, text: "tu-ru-ru" },
            { time: 8, text: "Eres tu, y tu, y tu," }, { time: 13, text: "tu-ru-ru-ru" },
            { time: 15, text: "Mmmmmm" }, { time: 18, text: "oh, oh oh" },
            { time: 23, text: "Eres tu, yeah" }, { time: 26, text: "tu-ru-ru-ru" },
            { time: 31, text: "..." }, { time: 33, text: "La que me fascina" },
            { time: 37, text: "La que me domina" }, { time: 40, text: "Mi mente se alinea cuando caminas" },
            { time: 45, text: "Eres tu, la calma y la ruina" }, { time: 53, text: "La voz que suena" },
            { time: 55, text: "Cuando el alma suspira" }, { time: 61, text: "Tus ojos son fuego en, la neblina" },
            { time: 64, text: "Tu risa me quema, me ilumina" }, { time: 68, text: "Y si no estas, el mundo gira" },
            { time: 72, text: "Pero sin rumbo, sin salida" }, { time: 76, text: "..." },
            { time: 79, text: "Eres tu (tu, y tu, y tu)" }, { time: 82, text: "Tu-ru-ru-ru (tu, y tu, y tu)" },
            { time: 87, text: "Eres tu (tu, y tu, y tu)" }, { time: 90, text: "Tu-ru-ru-ru" },
            { time: 93, text: "Eres tu (tu, y tu, y tu)" }, { time: 97, text: "Tu-ru-ru-ru (tu, y tu, y tu)" },
            { time: 102, text: "Eres tu (tu, y tu, y tu)" }, { time: 105, text: "Tu-ru-ru-ru" },
            { time: 107, text: "..." }, { time: 109, text: "Eres tan perfecta" },
            { time: 112, text: "Tan sincera, tan real, que me desespera" }, { time: 118, text: "Eres la razon por la que aun espero" },
            { time: 121, text: "La voz que suena cuando muero" }, { time: 125, text: "Eres tu, la que me enciende por dentro" },
            { time: 133, text: "Eres tu, mi mejor pensamiento" }, { time: 140, text: "Tus besos saben a calma y a miedo" },
            { time: 144, text: "A promesas que aun no entiendo" }, { time: 147, text: "Tus abrazos detienen el tiempo" },
            { time: 151, text: "Y en tus brazos, todo tiene sentido" }, { time: 155, text: "Tu mirada tan profunda y clara" },
            { time: 159, text: "Rompe el ruido, calla el alma" }, { time: 162, text: "Y tu sonrisa, mi desgracia" },
            { time: 166, text: "Mi adiccion, mi esperanza" }, { time: 171.5, text: "..." }
        ];

        const song = document.getElementById('song');
        const lyricsContainer = document.getElementById('lyrics-container');
        const particlesLayer = document.getElementById('particles-layer');
        const startModal = document.getElementById('startModal');
        const startBtn = document.getElementById('startBtn');

        let currentLineIndex = -1;
        let animationFrameId;

        // Intentar precargar audio inmediatamente
        song.load();

        function renderLyric(text) {
            if (lyricsContainer.innerText.trim() !== '') {
                lyricsContainer.classList.add('fade-out');
            }

            setTimeout(() => {
                lyricsContainer.innerHTML = '';
                lyricsContainer.classList.remove('fade-out');
                const words = text.split(' ');
                let delay = 0;

                words.forEach(word => {
                    const wordSpan = document.createElement('span');
                    wordSpan.className = 'lyric-word';
                    word.split('').forEach(char => {
                        const letterSpan = document.createElement('span');
                        letterSpan.className = 'letter';
                        letterSpan.textContent = char;
                        letterSpan.style.animationDelay = `${delay}s`;
                        delay += 0.04;
                        if (char === ',') delay += 1.5;
                        wordSpan.appendChild(letterSpan);
                    });
                    lyricsContainer.appendChild(wordSpan);
                });
            }, lyricsContainer.innerText.trim() !== '' ? 350 : 0);
        }

        function updateLyrics() {
            const currentTime = song.currentTime;
            let activeIndex = -1;

            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time) activeIndex = i;
                else break;
            }

            if (activeIndex !== currentLineIndex && activeIndex !== -1) {
                currentLineIndex = activeIndex;
                renderLyric(lyricsData[currentLineIndex].text);
            }

            if (currentTime >= 173) {
                song.pause();
                renderLyric('te amo');
                return;
            }
            animationFrameId = requestAnimationFrame(updateLyrics);
        }

        function createExplosion() {
            const centerX = Math.random() * window.innerWidth;
            const centerY = Math.random() * window.innerHeight;
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('span');
                p.className = 'particle';
                p.style.left = `${centerX}px`;
                p.style.top = `${centerY}px`;
                const angle = Math.random() * Math.PI * 2;
                const dist = 40 + Math.random() * 80;
                p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
                p.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
                p.style.setProperty('--size', `${2 + Math.random() * 4}px`);
                p.style.setProperty('--duration', `${800 + Math.random() * 500}ms`);
                fragment.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
            particlesLayer.appendChild(fragment);
        }

        // EL SECRETO PARA WHATSAPP: El evento 'touchstart' es más confiable que 'click'
        const startExperience = async (e) => {
            e.preventDefault();
            startModal.style.display = 'none';
            
            try {
                // Forzar reproducción inmediata
                await song.play();
                setInterval(createExplosion, 2500);
                updateLyrics();
            } catch (err) {
                // Si falla, mostrar un mensaje de ayuda
                alert("Por favor, desactiva el modo silencio y toca de nuevo.");
                startModal.style.display = 'flex';
            }
        };

        startBtn.addEventListener('touchstart', startExperience, { passive: false });
        startBtn.addEventListener('click', startExperience);
    </script>
</body>
</html>
